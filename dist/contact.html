<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/eea51bea51.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/main.css">
    <title>Singh's Clothing</title>
</head>
<body>
    <header id="header">
        <a class="logo-container" href="index.html"><i class="fas fa-tshirt"></i> Singh's Clothing</a>
        <div class="options">
            <a class="option" href="shop.html">SHOP</a>
            <a class="option" href="contact.html">CONTACT</a>
            <a class="option toggle-sign" href="signin.html">SIGN IN</a>
            <div class="cart-icon">
               <img class="shopping-icon" src="img/cart/cart-icon.svg">
                <span class="item-count">0</span>
            </div>
        </div>
        <div class="cart-dropdown">
            <div class="cart-items"></div>
            <button class="btn-dark button" onclick="location.href='checkout.html'">Checkout</button> 
        </div>
    </header>
    <section id="contact">
        <section id="sign-in">
        <div class="box">
            <h1 class="box-heading"><i class="fas fa-tshirt"></i>Singh's Clothing</h1>
            <form class="sign-in-form">
                <label>Name</label>
                <input type="name" name="name" />
                <label>Email</label>
                <input type="email" name="email" />
                <label>Subject</label>
                <input type="text" name="subject" />
                <label>Contact</label>
                <input type="number" name="contact" />
                <label>Message</label>
                <textarea class="message"></textarea>
                <button class="btn-dark btn-block">Submit</button>

            </form>
        </div>
    </section>
    <script src="https://www.gstatic.com/firebasejs/8.2.3/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.2.3/firebase-auth.js"></script>
    <script src="auth.js"></script>
    <script src="data.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
